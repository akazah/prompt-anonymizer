<!doctype html>
<!-- Source for demo/social/social_<lang>_<fmt>.{mp4,png} (SNS / X promo).
     Self-contained: system fonts only (needs a CJK font, e.g. fonts-noto-cjk),
     no network. record_social.mjs injects via window.renderSocial(payload)
     and seeks with window.seekSocial(tMs). Also exports still PNGs at the
     hook and punchline beats.

     Soft buddy-check tone (not an alarm): ~10.5 s, mute-first,
     calm hook → PII chips quietly flip to labels → punchline.
     OLED true-black, muted blue/amber. Formats: portrait 1080x1920 /
     square 1080x1080.

     Regeneration: node demo/scripts/record_social.mjs -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    /* Calm engineer palette — buddy check, not a red alert.
       stone = quiet UI, amber = "noticed", blue = masked / ok. */
    --ink: #e7e5e4;
    --muted: #a8a29e;
    --blue: #7dd3fc;
    --blue-soft: #bae6fd;
    --amber: #fcd34d;
    --font-ui: "Noto Sans CJK JP", "Noto Sans", "Helvetica Neue", Arial, sans-serif;
    --font-mono: "DejaVu Sans Mono", "Noto Sans Mono CJK JP", "SFMono-Regular", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body.portrait { width: 1080px; height: 1920px; }
  body.square { width: 1080px; height: 1080px; }
  body {
    background: #050505;
    color: var(--ink);
    font-family: var(--font-ui);
    position: relative;
  }

  .blob { position: absolute; border-radius: 50%; filter: blur(160px); }
  .b1 { width: 640px; height: 640px; left: -200px; top: -180px; background: #1e3a5f; opacity: 0.35; animation: drift1 14s ease-in-out infinite alternate; }
  .b2 { width: 480px; height: 480px; right: -160px; bottom: -140px; background: #292524; opacity: 0.4; animation: drift2 16s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0, 0) scale(1); } to { transform: translate(40px, 30px) scale(1.06); } }
  @keyframes drift2 { from { transform: translate(0, 0) scale(1.04); } to { transform: translate(-30px, -24px) scale(0.97); } }

  #progress {
    position: absolute; left: 0; bottom: 0; height: 6px; width: 0;
    background: rgba(125, 211, 252, 0.55);
    z-index: 40;
  }

  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; z-index: 10;
    padding: 0 64px;
  }
  .portrait .scene { padding: 0 72px; }

  /* ---- scene 1: calm hook ---- */
  .hook-line {
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.18;
    text-align: center;
    opacity: 0;
    color: var(--ink);
  }
  .portrait .hook-line { font-size: 92px; }
  .square .hook-line { font-size: 72px; }
  .hook-sub {
    margin-top: 36px;
    color: var(--muted);
    font-weight: 500;
    text-align: center;
    opacity: 0;
    line-height: 1.45;
  }
  .portrait .hook-sub { font-size: 38px; }
  .square .hook-sub { font-size: 30px; margin-top: 24px; }

  /* ---- scene 2: the quiet punch ---- */
  .card {
    position: relative;
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 2px solid rgba(168, 162, 158, 0.28);
    border-radius: 28px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    opacity: 0;
  }
  .portrait .card { padding: 44px 40px; }
  .square .card { padding: 32px 32px; }

  .prompt {
    line-height: 1.55;
    letter-spacing: 0.005em;
    font-weight: 500;
    color: #d6d3d1;
  }
  .portrait .prompt { font-size: 42px; }
  .square .prompt { font-size: 34px; }

  .word { display: inline-block; white-space: nowrap; }
  .char { opacity: 0; display: inline-block; }

  .pii {
    display: inline-block;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    vertical-align: -0.34em;
    border-radius: 12px;
    padding: 2px 12px;
  }
  .pii .orig { display: inline-block; white-space: pre; }
  .pii .lbl {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    white-space: nowrap;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.86em;
    color: var(--blue-soft);
  }

  .status-row {
    position: relative;
    margin-top: 32px;
    height: 1.5em;
  }
  .square .status-row { margin-top: 24px; }
  .status {
    position: absolute; left: 0; top: 0;
    display: inline-flex; align-items: center; gap: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    opacity: 0;
  }
  .portrait .status { font-size: 32px; }
  .square .status { font-size: 26px; }
  .status svg { width: 1.15em; height: 1.15em; flex: none; opacity: 0.9; }
  .status.notice { color: #fde68a; }
  .status.ok { color: var(--blue-soft); }

  .caption {
    margin-top: 44px;
    text-align: center;
    font-weight: 700;
    line-height: 1.32;
    letter-spacing: -0.01em;
    opacity: 0;
    color: var(--ink);
  }
  .portrait .caption { font-size: 48px; margin-top: 56px; }
  .square .caption { font-size: 38px; margin-top: 36px; }
  .caption .em {
    display: block;
    margin-top: 10px;
    color: var(--blue-soft);
    font-weight: 600;
  }
  .portrait .caption .em { font-size: 44px; }
  .square .caption .em { font-size: 34px; }

  /* ---- scene 3: quiet outro ---- */
  .logo-mark { opacity: 0; }
  .portrait .logo-mark svg { width: 140px; height: 140px; }
  .square .logo-mark svg { width: 108px; height: 108px; }
  .outro-title {
    font-weight: 700;
    letter-spacing: -0.015em;
    opacity: 0;
    color: var(--ink);
  }
  .portrait .outro-title { font-size: 76px; margin-top: 32px; }
  .square .outro-title { font-size: 58px; margin-top: 22px; }
  .outro-tag {
    color: var(--muted);
    font-weight: 500;
    text-align: center;
    opacity: 0;
    line-height: 1.45;
  }
  .portrait .outro-tag { font-size: 36px; margin-top: 24px; }
  .square .outro-tag { font-size: 28px; margin-top: 18px; }
  .outro-url {
    display: inline-block;
    font-family: var(--font-mono);
    font-weight: 600;
    color: #0c4a6e;
    background: var(--blue-soft);
    border-radius: 999px;
    opacity: 0;
  }
  .portrait .outro-url { font-size: 30px; padding: 18px 36px; margin-top: 44px; }
  .square .outro-url { font-size: 24px; padding: 14px 28px; margin-top: 30px; }
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div id="progress"></div>

  <section class="scene" id="scene-hook">
    <div class="hook-line" id="hook-1"></div>
    <div class="hook-line" id="hook-2"></div>
    <div class="hook-sub" id="hook-sub"></div>
  </section>

  <section class="scene" id="scene-punch">
    <div class="card" id="card">
      <div class="prompt" id="msg"></div>
      <div class="status-row">
        <div class="status notice" id="status-notice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>
          <span id="status-notice-text"></span>
        </div>
        <div class="status ok" id="status-ok">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/><path d="M8.5 12l2.5 2.5 4.5-4.8"/></svg>
          <span id="status-ok-text"></span>
        </div>
      </div>
    </div>
    <div class="caption" id="punchline">
      <span id="punch-1"></span>
      <span class="em" id="punch-2"></span>
    </div>
  </section>

  <section class="scene" id="scene-outro">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/>
        <path d="M8.5 12l2.5 2.5 4.5-4.8"/>
      </svg>
    </div>
    <div class="outro-title" id="outro-title"></div>
    <div class="outro-tag" id="outro-tag"></div>
    <div class="outro-url" id="outro-url"></div>
  </section>

<script>
"use strict";

const T = {
  hook1: 150,
  hook2: 500,
  hookSub: 1000,
  hookOut: 1900,
  punchIn: 2200,
  typeStart: 2500,
  typeDur: 1800,
  scanStart: 4400,
  scanStep: 200,
  noticeIn: 4700,
  noticeOut: 5800,
  maskStart: 6000,
  maskStep: 180,
  okIn: 6700,
  punchlineIn: 7400,
  punchOut: 9000,
  outroIn: 9300,
  end: 10800,
};

window.SOCIAL_STILLS = { hook: 1400, punch: 8200 };

const EASE_OUT = "cubic-bezier(0.22, 1, 0.36, 1)";
const $ = (id) => document.getElementById(id);

function anim(el, keyframes, opts) {
  return el.animate(keyframes, { fill: "forwards", easing: EASE_OUT, ...opts });
}
function show(el, delay, { duration = 500, y = 18, scale = 1 } = {}) {
  anim(el, [
    { opacity: 0, transform: `translateY(${y}px) scale(${scale})` },
    { opacity: 1, transform: "translateY(0) scale(1)" },
  ], { delay, duration });
}
function hideAt(el, delay, { duration = 360 } = {}) {
  anim(el, [{ opacity: 1 }, { opacity: 0 }], { delay, duration, easing: "ease-in" });
}

function tokenize(text) {
  const isCJK = (ch) => {
    const cp = ch.codePointAt(0);
    return cp >= 0x2e80 && cp <= 0x9fff;
  };
  const tokens = [];
  for (const ch of text) {
    const last = tokens[tokens.length - 1];
    if (/\s/.test(ch)) {
      if (last && last.space) last.text += ch;
      else tokens.push({ text: ch, space: true });
    } else if ("、。，．！？）」』】ーぁぃぅぇぉっゃゅょァィゥェォッャュョ々".includes(ch)) {
      if (last && !last.space) last.text += ch;
      else tokens.push({ text: ch, space: false });
    } else if (isCJK(ch)) {
      tokens.push({ text: ch, space: false });
    } else if (last && !last.space && !last.cjk) {
      last.text += ch;
    } else {
      tokens.push({ text: ch, space: false });
    }
    const cur = tokens[tokens.length - 1];
    if (!cur.space) cur.cjk = isCJK(ch) || cur.cjk;
  }
  return tokens;
}

function buildParts(container, parts) {
  const piiEls = [];
  for (const part of parts) {
    if (typeof part === "string") {
      for (const token of tokenize(part)) {
        if (token.space) {
          container.appendChild(document.createTextNode(token.text));
          continue;
        }
        const word = document.createElement("span");
        word.className = "word";
        for (const ch of token.text) {
          const s = document.createElement("span");
          s.className = "char";
          s.textContent = ch;
          word.appendChild(s);
        }
        container.appendChild(word);
      }
    } else {
      const wrap = document.createElement("span");
      wrap.className = "pii";
      const orig = document.createElement("span");
      orig.className = "orig";
      for (const ch of part.pii) {
        const s = document.createElement("span");
        s.className = "char";
        s.textContent = ch;
        orig.appendChild(s);
      }
      const lbl = document.createElement("span");
      lbl.className = "lbl";
      lbl.textContent = part.label;
      wrap.append(orig, lbl);
      container.appendChild(wrap);
      piiEls.push(wrap);
    }
  }
  return piiEls;
}

function typeChars(container, start, totalDur) {
  const chars = container.querySelectorAll(".char");
  const step = totalDur / Math.max(chars.length, 1);
  chars.forEach((ch, i) => {
    anim(ch, [
      { opacity: 0 },
      { opacity: 1 },
    ], { delay: start + i * step, duration: 50, easing: "ease-out" });
  });
}

const TINT = {
  none: "rgba(252, 211, 77, 0)",
  amber: "rgba(252, 211, 77, 0.14)",
  blue: "rgba(125, 211, 252, 0.14)",
};
function flip(wrap, delay) {
  const orig = wrap.querySelector(".orig");
  const lbl = wrap.querySelector(".lbl");
  anim(wrap, [
    { width: wrap.dataset.origW + "px", backgroundColor: TINT.amber },
    { width: wrap.dataset.lblW + "px", backgroundColor: TINT.blue },
  ], { delay, duration: 420 });
  anim(orig, [
    { opacity: 1 },
    { opacity: 0 },
  ], { delay, duration: 240, easing: "ease-in" });
  anim(lbl, [
    { opacity: 0 },
    { opacity: 1 },
  ], { delay: delay + 140, duration: 280 });
}

window.renderSocial = (payload) => {
  const { lang, fmt, social } = payload;
  document.documentElement.lang = lang;
  document.body.className = fmt;

  $("hook-1").textContent = social.hook.lines[0];
  $("hook-2").textContent = social.hook.lines[1] ?? "";
  $("hook-sub").textContent = social.hook.sub;
  $("status-notice-text").textContent = social.status.notice;
  $("status-ok-text").textContent = social.status.ok;
  $("punch-1").textContent = social.punchline[0];
  $("punch-2").textContent = social.punchline[1] ?? "";
  $("outro-title").textContent = social.outro.title;
  $("outro-tag").textContent = social.outro.tag;
  $("outro-url").textContent = social.outro.url;

  const msgPii = buildParts($("msg"), social.message);
  for (const wrap of msgPii) {
    const cs = getComputedStyle(wrap);
    const pad = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
    wrap.dataset.origW = wrap.querySelector(".orig").offsetWidth + pad;
    wrap.dataset.lblW = wrap.querySelector(".lbl").offsetWidth + pad;
    wrap.style.width = wrap.dataset.origW + "px";
  }

  show($("scene-hook"), 0, { duration: 1, y: 0 });
  show($("hook-1"), T.hook1, { duration: 550, y: 22 });
  show($("hook-2"), T.hook2, { duration: 550, y: 22 });
  show($("hook-sub"), T.hookSub, { duration: 450 });
  hideAt($("scene-hook"), T.hookOut);

  show($("scene-punch"), T.punchIn, { duration: 1, y: 0 });
  show($("card"), T.punchIn, { duration: 500, y: 22 });
  typeChars($("msg"), T.typeStart, T.typeDur);

  msgPii.forEach((wrap, i) => {
    anim(wrap, [
      { backgroundColor: TINT.none },
      { backgroundColor: TINT.amber },
    ], { delay: T.scanStart + i * T.scanStep, duration: 360 });
  });
  anim($("card"), [
    { borderColor: "rgba(168, 162, 158, 0.28)" },
    { borderColor: "rgba(252, 211, 77, 0.35)" },
  ], { delay: T.scanStart, duration: 450 });

  show($("status-notice"), T.noticeIn, { duration: 400, y: 10 });
  hideAt($("status-notice"), T.noticeOut, { duration: 280 });

  msgPii.forEach((wrap, i) => flip(wrap, T.maskStart + i * T.maskStep));
  anim($("card"), [
    { borderColor: "rgba(252, 211, 77, 0.35)" },
    { borderColor: "rgba(125, 211, 252, 0.4)" },
  ], { delay: T.maskStart, duration: 600 });

  show($("status-ok"), T.okIn, { duration: 420, y: 10 });
  show($("punchline"), T.punchlineIn, { duration: 550, y: 18 });
  hideAt($("scene-punch"), T.punchOut);

  show($("scene-outro"), T.outroIn, { duration: 1, y: 0 });
  show($("scene-outro").querySelector(".logo-mark"), T.outroIn + 80, { duration: 500, scale: 0.92 });
  show($("outro-title"), T.outroIn + 280, { duration: 480, y: 16 });
  show($("outro-tag"), T.outroIn + 520, { duration: 420 });
  show($("outro-url"), T.outroIn + 760, { duration: 450, y: 12 });

  anim($("progress"), [{ width: "0%" }, { width: "100%" }], { delay: 0, duration: T.end, easing: "linear" });
  window.SOCIAL_DURATION_MS = T.end;
};

window.seekSocial = (t) => {
  for (const a of document.getAnimations()) {
    a.pause();
    a.currentTime = t;
  }
};
</script>
</body>
</html>
