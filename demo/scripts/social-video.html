<!doctype html>
<!-- Source for demo/social/social_<lang>_<fmt>.mp4 (SNS-sized promo videos).
     Self-contained: system fonts only (needs a CJK font, e.g. fonts-noto-cjk),
     no network. Never opened by hand for asset generation - the recording
     script (record_social.mjs) injects per-language content via
     window.renderSocial(payload) and steps through the timeline with
     window.seekSocial(tMs), so the render is deterministic frame by frame.

     Story: an inside-your-organization zone (blue, trusted) and an
     outside zone (amber, external AI) separated by a dashed boundary.
     PII is masked inside; only labels ever cross the boundary; the reply
     comes back and is restored inside. OLED-friendly true-black palette.

     Formats: ?fmt=portrait (1080x1920, Reels/Shorts/TikTok) or
              ?fmt=square   (1080x1080, feed posts).

     Regeneration command: node demo/scripts/record_social.mjs -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    /* Palette chosen for the org-boundary story on OLED black, using
       everyday color semantics rather than dev-tool hues:
       blue = trusted inside-the-org zone (corporate trust),
       amber = outside / external AI (caution),
       red = PII danger, green = restored / success. */
    --ink: #f5f5f4;
    --muted: #9ca3af;
    --blue: #60a5fa;
    --blue-soft: #bfdbfe;
    --amber: #fbbf24;
    --amber-soft: #fde68a;
    --red: #f87171;
    --green: #4ade80;
    --font-ui: "Noto Sans CJK JP", "Noto Sans", "Helvetica Neue", Arial, sans-serif;
    /* Latin glyphs from DejaVu (clean spacing), CJK from Noto Mono. */
    --font-mono: "DejaVu Sans Mono", "Noto Sans Mono CJK JP", "SFMono-Regular", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body.portrait { width: 1080px; height: 1920px; }
  body.square { width: 1080px; height: 1080px; }
  body {
    background: #000;
    color: var(--ink);
    font-family: var(--font-ui);
    position: relative;
  }

  /* ---- decorative background (dim glows; true black stays dominant) ---- */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(140px);
  }
  .b1 { width: 640px; height: 640px; left: -200px; top: -180px; background: #1d4ed8; opacity: 0.28; animation: drift1 14s ease-in-out infinite alternate; }
  .b2 { width: 600px; height: 600px; right: -220px; bottom: -200px; background: #b45309; opacity: 0.2; animation: drift2 17s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0, 0) scale(1); } to { transform: translate(70px, 50px) scale(1.12); } }
  @keyframes drift2 { from { transform: translate(0, 0) scale(1.08); } to { transform: translate(-60px, -70px) scale(0.96); } }

  #progress {
    position: absolute; left: 0; bottom: 0; height: 10px; width: 0;
    background: linear-gradient(90deg, #3b82f6, var(--amber));
    z-index: 40;
  }

  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0;
    z-index: 10;
  }

  /* ---- scene 1: hook ---- */
  #scene-hook { padding: 0 70px; text-align: center; }
  .hook-line {
    font-weight: 800;
    letter-spacing: -0.015em;
    line-height: 1.16;
    opacity: 0;
    background: linear-gradient(115deg, #fafaf9 30%, var(--blue-soft) 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .portrait .hook-line { font-size: 92px; }
  .square .hook-line { font-size: 74px; }
  .hook-sub {
    margin-top: 44px;
    color: var(--muted);
    font-weight: 500;
    opacity: 0;
    line-height: 1.45;
  }
  .portrait .hook-sub { font-size: 40px; }
  .square .hook-sub { font-size: 33px; margin-top: 30px; }

  /* ---- scene 2-4: zones ---- */
  .portrait #scene-app { padding: 0 56px; }
  .square #scene-app { padding: 0 48px; }

  .zone {
    position: relative;
    width: 100%;
    border-radius: 32px;
    border: 2.5px solid;
  }
  .zone.inside {
    border-color: rgba(96, 165, 250, 0.45);
    background: rgba(96, 165, 250, 0.05);
    box-shadow: 0 0 70px rgba(96, 165, 250, 0.12), inset 0 0 60px rgba(96, 165, 250, 0.04);
  }
  .zone.outside {
    border-color: rgba(251, 191, 36, 0.42);
    background: rgba(251, 191, 36, 0.05);
    box-shadow: 0 0 70px rgba(251, 191, 36, 0.11), inset 0 0 60px rgba(251, 191, 36, 0.04);
  }
  /* Zone name pill sitting on the border (black plate cuts the border line). */
  .legend {
    position: absolute;
    display: inline-flex; align-items: center; gap: 13px;
    background: #000;
    border: 2px solid;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.02em;
    z-index: 5;
  }
  .portrait .legend { top: -30px; left: 34px; font-size: 30px; padding: 10px 26px; }
  .square .legend { top: -22px; left: 28px; font-size: 22px; padding: 5px 17px; }
  .legend svg { width: 1.15em; height: 1.15em; }
  .zone.inside .legend { color: var(--blue); border-color: rgba(96, 165, 250, 0.55); }
  .zone.outside .legend { color: var(--amber); border-color: rgba(251, 191, 36, 0.55); }

  .app-row {
    display: flex; align-items: center; gap: 15px;
  }
  .portrait .app-row { padding: 44px 36px 0; }
  .square .app-row { padding: 22px 28px 0; }
  .app-row svg { width: 34px; height: 34px; }
  .square .app-row svg { width: 25px; height: 25px; }
  .app-row .app { font-weight: 700; font-size: 29px; letter-spacing: 0.01em; }
  .square .app-row .app { font-size: 22px; }
  .app-row .lang-pill {
    margin-left: auto;
    font-size: 23px;
    font-weight: 600;
    color: var(--blue);
    background: rgba(96, 165, 250, 0.1);
    border: 1.5px solid rgba(96, 165, 250, 0.4);
    border-radius: 999px;
    padding: 5px 18px;
  }
  .square .app-row .lang-pill { font-size: 17px; padding: 2px 12px; }

  .zone-body { padding: 26px 32px 0; }
  .square .zone-body { padding: 13px 24px 0; }
  .zone.outside .zone-body { padding-bottom: 32px; }
  .square .zone.outside .zone-body { padding-bottom: 17px; }

  .bubble {
    border-radius: 26px;
    line-height: 1.6;
    letter-spacing: 0.005em;
    opacity: 0;
  }
  .portrait .bubble { font-size: 37px; padding: 26px 32px; }
  .square .bubble { font-size: 26px; padding: 13px 22px; }
  .bubble .tag {
    display: block;
    font-size: 0.58em;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .bubble.user {
    background: rgba(96, 165, 250, 0.09);
    border: 2px solid rgba(96, 165, 250, 0.28);
    border-bottom-right-radius: 8px;
    margin-left: 36px;
  }
  .bubble.restored {
    background: rgba(74, 222, 128, 0.08);
    border: 2px solid rgba(74, 222, 128, 0.3);
    border-bottom-left-radius: 8px;
    margin-right: 36px;
    margin-top: 24px;
  }
  .square .bubble.restored { margin-top: 13px; }
  .bubble.restored .tag { color: var(--green); }
  .bubble.sent {
    background: rgba(251, 191, 36, 0.08);
    border: 2px solid rgba(251, 191, 36, 0.3);
    border-bottom-right-radius: 8px;
    margin-left: 36px;
  }
  .bubble.sent .tag { color: var(--amber); }
  .bubble.reply {
    background: rgba(251, 191, 36, 0.06);
    border: 2px solid rgba(251, 191, 36, 0.22);
    border-bottom-left-radius: 8px;
    margin-right: 36px;
    margin-top: 24px;
  }
  .square .bubble.reply { margin-top: 13px; }
  .bubble.reply .tag { color: var(--amber-soft); }

  /* Words are inline-block (so lines only break between words / CJK chars),
     chars inside are inline-block so they can be transform-animated. */
  .word { display: inline-block; white-space: nowrap; }
  .char { opacity: 0; display: inline-block; }
  /* Punctuation right after a chip: pull it back over the chip padding. */
  .word.tight { margin-left: -0.28em; }

  .pii {
    display: inline-block;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    vertical-align: -0.34em;
    border-radius: 14px;
    padding: 2px 14px;
  }
  .pii .orig { display: inline-block; white-space: pre; }
  .pii .lbl {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    white-space: nowrap;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.86em;
    color: var(--blue-soft);
  }
  /* Static label chip (what actually crosses the boundary). */
  .pii-static {
    display: inline-block;
    white-space: nowrap;
    vertical-align: -0.3em;
    border-radius: 14px;
    padding: 2px 14px;
    background: rgba(96, 165, 250, 0.14);
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.86em;
    color: var(--blue-soft);
  }

  .dots {
    display: inline-flex; gap: 12px;
    margin-top: 24px;
    background: rgba(251, 191, 36, 0.07);
    border: 2px solid rgba(251, 191, 36, 0.2);
    border-radius: 26px; border-bottom-left-radius: 8px;
    padding: 22px 30px;
    opacity: 0;
  }
  .square .dots { margin-top: 11px; padding: 9px 18px; }
  .dots i {
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--amber);
    animation: bounce 1s ease-in-out infinite;
  }
  .dots i:nth-child(2) { animation-delay: 0.16s; }
  .dots i:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-11px); opacity: 1; } }

  .actions {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .portrait .actions { height: 132px; }
  .square .actions { height: 72px; }
  .btn { position: absolute; opacity: 0; }
  .btn-inner {
    display: inline-flex; align-items: center; gap: 16px;
    font-family: var(--font-ui);
    font-weight: 700;
    color: #172554;
    background: linear-gradient(150deg, #93c5fd, #3b82f6);
    border-radius: 999px;
    box-shadow: 0 14px 40px rgba(59, 130, 246, 0.35);
  }
  .portrait .btn-inner { font-size: 34px; padding: 18px 44px; }
  .square .btn-inner { font-size: 25px; padding: 10px 30px; }
  .btn-inner svg { width: 1.15em; height: 1.15em; }
  .btn .ring {
    position: absolute; inset: -14px;
    border: 4px solid rgba(147, 197, 253, 0.9);
    border-radius: 999px;
    opacity: 0;
  }
  /* Restore is the success action: green instead of the blue primary. */
  #btn-restore .btn-inner {
    color: #052e16;
    background: linear-gradient(150deg, #86efac, #22c55e);
    box-shadow: 0 14px 40px rgba(34, 197, 94, 0.35);
  }
  #btn-restore .ring { border-color: rgba(134, 239, 172, 0.9); }

  .badge {
    position: absolute;
    display: inline-flex; align-items: center; gap: 13px;
    font-weight: 700;
    color: #172554;
    background: linear-gradient(150deg, var(--blue-soft), var(--blue));
    border-radius: 999px;
    box-shadow: 0 16px 44px rgba(96, 165, 250, 0.4);
    opacity: 0;
    z-index: 20;
  }
  .portrait .badge { font-size: 28px; padding: 13px 28px; top: -30px; right: 26px; }
  .square .badge { font-size: 20px; padding: 7px 18px; top: -21px; right: 22px; }
  .badge svg { width: 1.2em; height: 1.2em; }

  /* ---- boundary between the zones ---- */
  .boundary {
    width: 100%;
    display: flex; align-items: center; gap: 24px;
    opacity: 0;
  }
  .portrait .boundary { height: 120px; padding: 0 8px; }
  .square .boundary { height: 54px; padding: 0 6px; }
  .boundary .line {
    flex: 1;
    border-top: 3.5px dashed rgba(148, 163, 184, 0.42);
  }
  .boundary .gate {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: #000;
    border: 2.5px solid rgba(148, 163, 184, 0.5);
    color: #cbd5e1;
  }
  .portrait .gate { width: 84px; height: 84px; }
  .square .gate { width: 54px; height: 54px; }
  .boundary .gate svg { width: 58%; height: 58%; }

  .caption-slot {
    position: relative;
    width: 100%;
    display: flex; justify-content: center;
  }
  .portrait .caption-slot { margin-top: 58px; height: 210px; }
  .square .caption-slot { margin-top: 10px; height: 90px; }
  .caption {
    position: absolute;
    display: inline-flex; align-items: center; gap: 20px;
    max-width: 95%;
    font-weight: 600;
    line-height: 1.4;
    background: rgba(6, 8, 14, 0.82);
    border: 2px solid rgba(255, 255, 255, 0.14);
    border-radius: 24px;
    opacity: 0;
  }
  .portrait .caption { font-size: 36px; padding: 24px 36px; }
  .square .caption { font-size: 25px; padding: 12px 22px; }
  .caption svg { flex: none; width: 1.4em; height: 1.4em; }
  .caption.warn { color: #fecaca; border-color: rgba(248, 113, 113, 0.45); }
  .caption.safe { color: var(--blue-soft); border-color: rgba(96, 165, 250, 0.45); }
  .caption.done { color: #bbf7d0; border-color: rgba(74, 222, 128, 0.45); }

  /* ---- scene 5: outro ---- */
  #scene-outro { text-align: center; padding: 0 70px; }
  .logo-mark { opacity: 0; }
  .portrait .logo-mark svg { width: 190px; height: 190px; }
  .square .logo-mark svg { width: 140px; height: 140px; }
  .outro-title {
    font-weight: 800;
    letter-spacing: -0.015em;
    opacity: 0;
    background: linear-gradient(115deg, #fafaf9 30%, var(--blue-soft) 85%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .portrait .outro-title { font-size: 92px; margin-top: 40px; }
  .square .outro-title { font-size: 72px; margin-top: 26px; }
  .outro-tag { color: var(--ink); font-weight: 600; opacity: 0; }
  .portrait .outro-tag { font-size: 42px; margin-top: 34px; }
  .square .outro-tag { font-size: 34px; margin-top: 22px; }
  .outro-features { color: var(--muted); font-weight: 500; opacity: 0; }
  .portrait .outro-features { font-size: 33px; margin-top: 48px; }
  .square .outro-features { font-size: 27px; margin-top: 30px; }
  .outro-langs { color: var(--muted); font-weight: 500; opacity: 0; }
  .portrait .outro-langs { font-size: 33px; margin-top: 16px; }
  .square .outro-langs { font-size: 27px; margin-top: 10px; }
  .outro-url {
    display: inline-block;
    font-family: var(--font-mono);
    font-weight: 700;
    color: #172554;
    background: linear-gradient(150deg, #93c5fd, #3b82f6);
    border-radius: 999px;
    box-shadow: 0 16px 44px rgba(59, 130, 246, 0.35);
    opacity: 0;
  }
  .portrait .outro-url { font-size: 36px; padding: 22px 46px; margin-top: 64px; }
  .square .outro-url { font-size: 29px; padding: 16px 36px; margin-top: 38px; }
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div id="progress"></div>

  <section class="scene" id="scene-hook">
    <div class="hook-line" id="hook-1"></div>
    <div class="hook-line" id="hook-2"></div>
    <div class="hook-sub" id="hook-sub"></div>
  </section>

  <section class="scene" id="scene-app">
    <div class="zone inside" id="zone-inside">
      <span class="legend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/><path d="M8.5 12l2.5 2.5 4.5-4.8"/></svg><span id="legend-inside"></span></span>
      <div class="badge" id="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <span id="badge-text"></span>
      </div>
      <div class="app-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/><path d="M8.5 12l2.5 2.5 4.5-4.8"/></svg>
        <span class="app" id="app-name"></span>
        <span class="lang-pill" id="lang-pill"></span>
      </div>
      <div class="zone-body">
        <div class="bubble user" id="msg"></div>
        <div class="bubble restored" id="restored"><span class="tag" id="restored-tag"></span><span id="restored-body"></span></div>
      </div>
      <div class="actions">
        <span class="btn" id="btn-anon"><span class="ring"></span><span class="btn-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/></svg><span id="btn-anon-text"></span></span></span>
        <span class="btn" id="btn-restore"><span class="ring"></span><span class="btn-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg><span id="btn-restore-text"></span></span></span>
      </div>
    </div>

    <div class="boundary" id="boundary">
      <span class="line"></span>
      <span class="gate" id="gate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/><path d="M8.5 12l2.5 2.5 4.5-4.8"/></svg></span>
      <span class="line"></span>
    </div>

    <div class="zone outside" id="zone-outside">
      <span class="legend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 .4-9A6.5 6.5 0 0 0 5.2 8.8 4.2 4.2 0 0 0 6.2 17"/><path d="M6.2 17h11.3"/></svg><span id="legend-outside"></span></span>
      <div class="zone-body">
        <div class="bubble sent" id="sent"><span class="tag" id="sent-tag"></span><span id="sent-body"></span></div>
        <div class="dots" id="dots"><i></i><i></i><i></i></div>
        <div class="bubble reply" id="reply"><span class="tag" id="reply-tag"></span><span id="reply-body"></span></div>
      </div>
    </div>

    <div class="caption-slot">
      <span class="caption warn" id="cap-typed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.8L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.8a2 2 0 0 0-3.4 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg><span></span></span>
      <span class="caption safe" id="cap-sent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/><path d="M8.5 12l2.5 2.5 4.5-4.8"/></svg><span></span></span>
      <span class="caption done" id="cap-restored"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M9 12.5l2.2 2.2 4-4.4"/></svg><span></span></span>
    </div>
  </section>

  <section class="scene" id="scene-outro">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#bfdbfe"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs>
        <path d="M12 2l8 3.5v5.2c0 5-3.4 9.4-8 11.3-4.6-1.9-8-6.3-8-11.3V5.5z"/>
        <path d="M8.5 12l2.5 2.5 4.5-4.8"/>
      </svg>
    </div>
    <div class="outro-title" id="outro-title"></div>
    <div class="outro-tag" id="outro-tag"></div>
    <div class="outro-features" id="outro-features"></div>
    <div class="outro-langs" id="outro-langs"></div>
    <div class="outro-url" id="outro-url"></div>
  </section>

<script>
"use strict";

// Timeline (ms). Every visual event hangs off these constants so the whole
// video can be retimed in one place. seekSocial() drives the clock.
const T = {
  hook1: 250,
  hook2: 850,
  hookSub: 1600,
  hookOut: 2750,
  appIn: 3250,
  typeStart: 4000,
  typeDur: 3300,
  scanStart: 7550,
  scanStep: 260,
  capTypedIn: 7900,
  capTypedOut: 10500,
  btnAnonIn: 8500,
  btnAnonPress: 9400,
  btnAnonOut: 11450,
  maskStart: 9700,
  maskStep: 220,
  badgePop: 10650,
  gatePulse: 11550,
  sentIn: 11650,
  capSentIn: 11950,
  capSentOut: 16350,
  dotsIn: 12650,
  dotsOut: 13700,
  replyIn: 13850,
  restoredIn: 15300,
  btnRestoreIn: 15750,
  btnRestorePress: 16650,
  btnRestoreOut: 19050,
  restoreStart: 16950,
  restoreStep: 220,
  capRestoredIn: 17850,
  capRestoredOut: 19450,
  appOut: 19700,
  outroIn: 20200,
  end: 24000,
};

const EASE_OUT = "cubic-bezier(0.22, 1, 0.36, 1)";
const $ = (id) => document.getElementById(id);

function anim(el, keyframes, opts) {
  return el.animate(keyframes, { fill: "forwards", easing: EASE_OUT, ...opts });
}
function show(el, delay, { duration = 550, y = 26, scale = 1 } = {}) {
  anim(el, [
    { opacity: 0, transform: `translateY(${y}px) scale(${scale})` },
    { opacity: 1, transform: "translateY(0) scale(1)" },
  ], { delay, duration });
}
function hideAt(el, delay, { duration = 420 } = {}) {
  anim(el, [{ opacity: 1 }, { opacity: 0 }], { delay, duration, easing: "ease-in" });
}
function press(btn, delay) {
  const inner = btn.querySelector(".btn-inner");
  const ring = btn.querySelector(".ring");
  anim(inner, [
    { transform: "scale(1)" },
    { transform: "scale(0.9)", offset: 0.35 },
    { transform: "scale(1.05)", offset: 0.7 },
    { transform: "scale(1)" },
  ], { delay, duration: 480, easing: "ease-out" });
  anim(ring, [
    { opacity: 0.9, transform: "scale(0.85)" },
    { opacity: 0, transform: "scale(1.35)" },
  ], { delay: delay + 100, duration: 600, easing: "ease-out" });
}

// Splits a string into wrap-safe tokens: whitespace runs, single CJK chars
// (CJK text may break between any two chars), and non-CJK runs (whole latin
// words). Closing punctuation sticks to the previous token (kinsoku shori).
function tokenize(text) {
  const isCJK = (ch) => {
    const cp = ch.codePointAt(0);
    return cp >= 0x2e80 && cp <= 0x9fff;
  };
  const tokens = [];
  for (const ch of text) {
    const last = tokens[tokens.length - 1];
    if (/\s/.test(ch)) {
      if (last && last.space) last.text += ch;
      else tokens.push({ text: ch, space: true });
    } else if ("、。，．！？）」』】ーぁぃぅぇぉっゃゅょァィゥェォッャュョ々".includes(ch)) {
      if (last && !last.space) last.text += ch;
      else tokens.push({ text: ch, space: false });
    } else if (isCJK(ch)) {
      tokens.push({ text: ch, space: false });
    } else if (last && !last.space && !last.cjk) {
      last.text += ch;
    } else {
      tokens.push({ text: ch, space: false });
    }
    const cur = tokens[tokens.length - 1];
    if (!cur.space) cur.cjk = isCJK(ch) || cur.cjk;
  }
  return tokens;
}

// Builds the typed message / reply from an array of plain strings and
// { pii, label } spans. Returns the .pii elements for the flip animations.
function buildParts(container, parts) {
  const piiEls = [];
  for (const part of parts) {
    if (typeof part === "string") {
      let first = true;
      for (const token of tokenize(part)) {
        if (token.space) {
          container.appendChild(document.createTextNode(token.text));
          first = false;
          continue;
        }
        const word = document.createElement("span");
        const afterChip = first && container.lastElementChild?.classList.contains("pii");
        word.className = afterChip && /^[.,!?;:、。]/.test(token.text) ? "word tight" : "word";
        first = false;
        for (const ch of token.text) {
          const s = document.createElement("span");
          s.className = "char";
          s.textContent = ch;
          word.appendChild(s);
        }
        container.appendChild(word);
      }
    } else {
      const wrap = document.createElement("span");
      wrap.className = "pii";
      const orig = document.createElement("span");
      orig.className = "orig";
      for (const ch of part.pii) {
        const s = document.createElement("span");
        s.className = "char";
        s.textContent = ch;
        orig.appendChild(s);
      }
      const lbl = document.createElement("span");
      lbl.className = "lbl";
      lbl.textContent = part.label;
      wrap.append(orig, lbl);
      container.appendChild(wrap);
      piiEls.push(wrap);
    }
  }
  return piiEls;
}

// Static rendering (no typing, no flips): what the outside world sees -
// plain text with label chips only. Real PII never appears here.
function buildStatic(container, parts) {
  for (const part of parts) {
    if (typeof part === "string") {
      container.appendChild(document.createTextNode(part));
    } else {
      const chip = document.createElement("span");
      chip.className = "pii-static";
      chip.textContent = part.label;
      container.appendChild(chip);
    }
  }
}

function typeChars(container, start, totalDur) {
  const chars = container.querySelectorAll(".char");
  const step = totalDur / Math.max(chars.length, 1);
  chars.forEach((ch, i) => {
    anim(ch, [
      { opacity: 0, transform: "translateY(8px)" },
      { opacity: 1, transform: "translateY(0)" },
    ], { delay: start + i * step, duration: 70, easing: "ease-out" });
  });
}

// PII chip flip: crossfade orig <-> label while animating the chip width,
// with a background tint per state (red = detected, blue = masked,
// green = restored).
const TINT = {
  none: "rgba(248, 113, 113, 0)",
  red: "rgba(248, 113, 113, 0.22)",
  blue: "rgba(96, 165, 250, 0.17)",
  green: "rgba(74, 222, 128, 0.15)",
};
function flip(wrap, delay, dir) {
  const orig = wrap.querySelector(".orig");
  const lbl = wrap.querySelector(".lbl");
  const origW = wrap.dataset.origW;
  const lblW = wrap.dataset.lblW;
  const toLbl = dir === "mask";
  anim(wrap, [
    {
      width: (toLbl ? origW : lblW) + "px",
      backgroundColor: toLbl ? TINT.red : TINT.blue,
      boxShadow: toLbl ? "0 0 0 3px rgba(248, 113, 113, 0.35)" : "0 0 0 3px rgba(96, 165, 250, 0.3)",
    },
    {
      width: (toLbl ? lblW : origW) + "px",
      backgroundColor: toLbl ? TINT.blue : TINT.green,
      boxShadow: toLbl ? "0 0 0 3px rgba(96, 165, 250, 0.3)" : "0 0 0 3px rgba(74, 222, 128, 0)",
    },
  ], { delay, duration: 450 });
  anim(toLbl ? orig : lbl, [
    { opacity: 1, transform: (toLbl ? "" : "translateY(-50%) ") + "translateY(0) scale(1)" },
    { opacity: 0, transform: (toLbl ? "" : "translateY(-50%) ") + "translateY(-12px) scale(0.9)" },
  ], { delay, duration: 260, easing: "ease-in" });
  anim(toLbl ? lbl : orig, [
    { opacity: 0, transform: (toLbl ? "translateY(-50%) " : "") + "translateY(12px) scale(0.9)" },
    { opacity: 1, transform: (toLbl ? "translateY(-50%) " : "") + "translateY(0) scale(1)" },
  ], { delay: delay + 150, duration: 320 });
}

window.renderSocial = (payload) => {
  const { lang, fmt, social } = payload;
  document.documentElement.lang = lang;
  document.body.className = fmt;

  $("hook-1").textContent = social.hook.lines[0];
  $("hook-2").textContent = social.hook.lines[1] ?? "";
  $("hook-sub").textContent = social.hook.sub;
  $("legend-inside").textContent = social.ui.zoneInside;
  $("legend-outside").textContent = social.ui.zoneOutside;
  $("app-name").textContent = social.ui.app;
  $("lang-pill").textContent = social.ui.langPill;
  $("badge-text").textContent = social.ui.badge;
  $("btn-anon-text").textContent = social.ui.anonymize;
  $("btn-restore-text").textContent = social.ui.restore;
  $("sent-tag").textContent = social.ui.sentTag;
  $("reply-tag").textContent = social.ui.replyTag;
  $("restored-tag").textContent = social.ui.restoredTag;
  $("cap-typed").querySelector("span:last-child").textContent = social.captions.typed;
  $("cap-sent").querySelector("span:last-child").textContent = social.captions.sent;
  $("cap-restored").querySelector("span:last-child").textContent = social.captions.restored;
  $("outro-title").textContent = social.outro.title;
  $("outro-tag").textContent = social.outro.tag;
  $("outro-features").textContent = social.outro.features;
  $("outro-langs").textContent = social.outro.langs;
  $("outro-url").textContent = social.outro.url;

  const msgPii = buildParts($("msg"), social.message);
  const restoredPii = buildParts($("restored-body"), social.reply);
  buildStatic($("sent-body"), social.message);
  buildStatic($("reply-body"), social.reply);

  // Measure chip widths while both layers still have their natural size
  // (.lbl is absolutely positioned, so offsetWidth is its shrink-wrap width).
  // Chips are border-box, so add their own horizontal padding on top of the
  // content width - otherwise the last characters get clipped.
  for (const wrap of [...msgPii, ...restoredPii]) {
    const cs = getComputedStyle(wrap);
    const pad = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
    wrap.dataset.origW = wrap.querySelector(".orig").offsetWidth + pad;
    wrap.dataset.lblW = wrap.querySelector(".lbl").offsetWidth + pad;
    wrap.style.width = wrap.dataset.origW + "px";
  }
  // The restored reply starts in the masked (label) state.
  for (const wrap of restoredPii) {
    wrap.style.width = wrap.dataset.lblW + "px";
    wrap.style.backgroundColor = TINT.blue;
    wrap.querySelector(".orig").style.opacity = "0";
    wrap.querySelector(".lbl").style.opacity = "1";
  }
  // Restored-reply text is visible as soon as its bubble pops in.
  $("restored-body").querySelectorAll(".char").forEach((ch) => { ch.style.opacity = "1"; });

  // ---- scene 1: hook ----
  show($("scene-hook"), 0, { duration: 1, y: 0 });
  show($("hook-1"), T.hook1, { duration: 650, y: 40 });
  show($("hook-2"), T.hook2, { duration: 650, y: 40 });
  show($("hook-sub"), T.hookSub, { duration: 550 });
  hideAt($("scene-hook"), T.hookOut);

  // ---- scene 2: zones appear, typing + detection (inside) ----
  show($("scene-app"), T.appIn, { duration: 550, y: 50 });
  show($("zone-inside"), T.appIn + 100, { duration: 500, y: 30 });
  show($("boundary"), T.appIn + 280, { duration: 500, y: 0 });
  show($("zone-outside"), T.appIn + 420, { duration: 500, y: 30 });
  show($("msg"), T.appIn + 600, { duration: 450, y: 20 });
  typeChars($("msg"), T.typeStart, T.typeDur);
  msgPii.forEach((wrap, i) => {
    anim(wrap, [
      { backgroundColor: TINT.none, boxShadow: "0 0 0 0 rgba(248, 113, 113, 0)" },
      { backgroundColor: TINT.red, boxShadow: "0 0 0 3px rgba(248, 113, 113, 0.35)" },
    ], { delay: T.scanStart + i * T.scanStep, duration: 380 });
  });
  show($("cap-typed"), T.capTypedIn, { duration: 450, y: 22 });
  hideAt($("cap-typed"), T.capTypedOut);

  // ---- scene 3: anonymize inside, labels cross the boundary ----
  show($("btn-anon"), T.btnAnonIn, { duration: 420, y: 18 });
  press($("btn-anon"), T.btnAnonPress);
  hideAt($("btn-anon"), T.btnAnonOut);
  msgPii.forEach((wrap, i) => flip(wrap, T.maskStart + i * T.maskStep, "mask"));
  anim($("badge"), [
    { opacity: 0, transform: "scale(0.5) rotate(-10deg)" },
    { opacity: 1, transform: "scale(1.12) rotate(2deg)", offset: 0.65 },
    { opacity: 1, transform: "scale(1) rotate(0deg)" },
  ], { delay: T.badgePop, duration: 550 });
  // Boundary gate lights up blue as the labels pass through.
  anim($("gate"), [
    { transform: "scale(1)", color: "#cbd5e1", borderColor: "rgba(148, 163, 184, 0.5)" },
    { transform: "scale(1.25)", color: "#60a5fa", borderColor: "rgba(96, 165, 250, 0.9)", offset: 0.4 },
    { transform: "scale(1)", color: "#60a5fa", borderColor: "rgba(96, 165, 250, 0.7)" },
  ], { delay: T.gatePulse, duration: 700 });
  // The masked prompt (labels only) slides down across the boundary.
  show($("sent"), T.sentIn, { duration: 650, y: -120 });
  show($("cap-sent"), T.capSentIn, { duration: 450, y: 22 });
  hideAt($("cap-sent"), T.capSentOut);

  // ---- scene 4: external AI reply, back inside, restore ----
  show($("dots"), T.dotsIn, { duration: 350, y: 16 });
  hideAt($("dots"), T.dotsOut, { duration: 200 });
  anim($("dots"), [{ height: getComputedStyle($("dots")).height }, { height: "0px", marginTop: "0px", paddingTop: "0px", paddingBottom: "0px", borderWidth: "0px" }],
    { delay: T.replyIn - 80, duration: 220, easing: "ease-in" });
  show($("reply"), T.replyIn, { duration: 500, y: 26 });
  // The reply comes back up into the org zone.
  show($("restored"), T.restoredIn, { duration: 600, y: 90 });
  show($("btn-restore"), T.btnRestoreIn, { duration: 420, y: 18 });
  press($("btn-restore"), T.btnRestorePress);
  hideAt($("btn-restore"), T.btnRestoreOut);
  [...restoredPii, ...msgPii].forEach((wrap, i) => flip(wrap, T.restoreStart + i * T.restoreStep, "restore"));
  show($("cap-restored"), T.capRestoredIn, { duration: 450, y: 22 });
  hideAt($("cap-restored"), T.capRestoredOut);
  hideAt($("scene-app"), T.appOut, { duration: 480 });

  // ---- scene 5: outro ----
  show($("scene-outro"), T.outroIn, { duration: 1, y: 0 });
  anim($("scene-outro").querySelector(".logo-mark"), [
    { opacity: 0, transform: "scale(0.6)" },
    { opacity: 1, transform: "scale(1.06)", offset: 0.7 },
    { opacity: 1, transform: "scale(1)" },
  ], { delay: T.outroIn + 100, duration: 650 });
  show($("outro-title"), T.outroIn + 350, { duration: 600, y: 34 });
  show($("outro-tag"), T.outroIn + 750, { duration: 550 });
  show($("outro-features"), T.outroIn + 1150, { duration: 500 });
  show($("outro-langs"), T.outroIn + 1350, { duration: 500 });
  show($("outro-url"), T.outroIn + 1650, { duration: 550, y: 20 });

  anim($("progress"), [{ width: "0%" }, { width: "100%" }], { delay: 0, duration: T.end, easing: "linear" });

  window.SOCIAL_DURATION_MS = T.end;
};

window.seekSocial = (t) => {
  for (const a of document.getAnimations()) {
    a.pause();
    a.currentTime = t;
  }
};
</script>
</body>
</html>
