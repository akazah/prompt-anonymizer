name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.13"
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      # Job-wide so every `uv run` uses the matrix interpreter
      # (overrides .python-version).
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          # Caches downloaded wheels, including the spaCy model wheels
          # locked in the `models` dependency group.
          enable-cache: true

      - name: Sync dependencies (incl. spaCy sm models)
        run: uv sync --all-extras --group models

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: README i18n freshness
        run: uv run python scripts/render_readme_i18n.py --check

      - name: Format check (ruff)
        run: uv run ruff format --check src tests demo

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests with coverage gate
        run: uv run pytest -m "not slow" --cov --cov-fail-under=85

      - name: Build sdist + wheel
        run: uv build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      # Validates every *.md in the repo: relative file links exist and
      # #anchors resolve via github-slugger (GitHub's slug algorithm).
      - name: Docs check (links + freshness)
        working-directory: web
        run: pnpm docs:check

      - name: Lint (tsc)
        working-directory: web
        run: pnpm lint

      - name: Test (vitest, all packages)
        working-directory: web
        run: pnpm test

      - name: Build web + extension (incl. core dependency)
        working-directory: web
        run: pnpm --filter "@prompt-anonymizer/web..." --filter "@prompt-anonymizer/extension..." build

      # Fails when the TS regex recognizers drift from the table committed in
      # docs/EVAL.md (fast: golden set + regexes only, no models). The Python
      # counterpart is tests/unit/test_golden_freshness.py in the python job.
      - name: Golden eval table check (TS core vs docs/EVAL.md)
        working-directory: web/packages/core
        run: node scripts/eval-golden.mjs --check

      # E2E reuses the dist/ built above (no rebuild). The default suite is
      # regex-only and fully offline; the NER suite runs in weekly-eval.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        working-directory: web
        run: pnpm --filter @prompt-anonymizer/e2e exec playwright install --with-deps chromium

      - name: E2E tests (Playwright, offline)
        working-directory: web
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            web/e2e/playwright-report/
            web/e2e/test-results/
          retention-days: 7
