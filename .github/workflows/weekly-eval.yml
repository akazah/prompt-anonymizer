name: Weekly accuracy evaluation

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Sync dependencies (incl. spaCy sm + lg models)
        run: uv sync --group models --group models-lg

      - name: Accuracy regression tests
        run: uv run pytest -m slow -q

      - name: Full evaluation (lg models)
        run: uv run python -m prompt_anonymizer.evals --model-size lg --output eval-lg.md

      - uses: actions/upload-artifact@v7
        with:
          name: eval-report
          path: eval-lg.md

  # Evaluation-gated GLiNER PII backend (docs/PLAN_INTL_PII.md P17): keep
  # tracking the candidate models weekly without adding them to PR CI.
  eval-gliner:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Sync dependencies (incl. the gliner extra)
        run: uv sync --group models --extra gliner

      - name: Cache GLiNER models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          # Model names + revision pins live in gliner_ner.py; a change
          # there invalidates the cache.
          key: gliner-models-${{ runner.os }}-${{ hashFiles('src/prompt_anonymizer/recognizers/gliner_ner.py') }}

      - name: GLiNER backend tests
        run: uv run pytest tests/integration/test_gliner_backend.py -q

      - name: Evaluation (gliner backend)
        run: >
          uv run python -m prompt_anonymizer.evals --ner-backend gliner
          --languages ja en es vi --output eval-gliner.md --golden-dir /tmp/golden

      - uses: actions/upload-artifact@v7
        with:
          name: eval-report-gliner
          path: eval-gliner.md

  # Full-pipeline browser e2e including the transformers.js NER models.
  # Kept out of PR CI (model download is large/slow); the browser profile is
  # cached so subsequent weekly runs skip the download.
  e2e-ner:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web app (incl. core dependency)
        working-directory: web
        run: pnpm --filter "@prompt-anonymizer/web..." build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: Cache NER models (browser profile)
        uses: actions/cache@v5
        with:
          path: web/e2e/.cache
          # Model IDs live in ner.ts; a change there invalidates the cache.
          key: ner-profile-${{ runner.os }}-${{ hashFiles('web/packages/core/src/ner.ts') }}

      - name: Install Playwright Chromium
        working-directory: web
        run: pnpm --filter @prompt-anonymizer/e2e exec playwright install --with-deps chromium

      - name: E2E tests (full NER pipeline)
        working-directory: web
        run: pnpm e2e:ner

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ner
          path: |
            web/e2e/playwright-report/
            web/e2e/test-results/
          retention-days: 7
