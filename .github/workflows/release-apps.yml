name: Release (Desktop / Extension / Web)

on:
  push:
    tags: ["v*"]
  # Escape hatch: rebuild assets for an existing release from a branch
  # (e.g. after a build fix that landed on main after the tag was cut).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach assets to (e.g. v0.2.0)"
        required: true

env:
  # Tag push -> the tag itself; manual dispatch -> the tag given as input.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  web-and-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web app + extension (incl. core dependency)
        working-directory: web
        run: pnpm --filter "@prompt-anonymizer/web..." --filter "@prompt-anonymizer/extension..." build

      - name: Zip artifacts
        run: |
          VERSION="${RELEASE_TAG#v}"
          (cd web/apps/web/dist && zip -rq "$GITHUB_WORKSPACE/prompt-anonymizer-web-$VERSION.zip" .)
          (cd web/apps/extension/dist && zip -rq "$GITHUB_WORKSPACE/prompt-anonymizer-extension-$VERSION.zip" .)

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: |
            prompt-anonymizer-web-*.zip
            prompt-anonymizer-extension-*.zip

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: web/apps/desktop/src-tauri

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build and attach desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web/apps/desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseDraft: false
          args: ${{ matrix.args }}
