  preamble: |
    # Prompt Anonymizer
    
    > **A buddy check for your prompts ŌĆö before they reach an LLM.**
    > On-device, reversible anonymization that catches the PII you didn't mean to send.
    
    [![CI](https://github.com/akazah/prompt-anonymizer/actions/workflows/ci.yml/badge.svg)](https://github.com/akazah/prompt-anonymizer/actions/workflows/ci.yml)
    [![Release](https://img.shields.io/github/v/release/akazah/prompt-anonymizer)](https://github.com/akazah/prompt-anonymizer/releases)
    [![PyPI](https://img.shields.io/pypi/v/prompt-anonymizer?logo=pypi&logoColor=white)](https://pypi.org/project/prompt-anonymizer/)
    [![npm](https://img.shields.io/npm/v/%40prompt-anonymizer%2Fcli?logo=npm)](https://www.npmjs.com/package/@prompt-anonymizer/cli)
    [![Python](https://img.shields.io/badge/python-3.12%E2%80%933.13-blue)](pyproject.toml)
    [![License: MIT](https://img.shields.io/badge/license-MIT-green)](LICENSE)
    
    Your team already has the rule: *don't paste customer data, secrets, or
    personal info into ChatGPT / Claude / Gemini.* But people are in a hurry, and
    a name or a phone number slips through. Prompt Anonymizer is the buddy check ŌĆö
    it runs **on your machine** and catches that PII **before** the text leaves,
    so a slip doesn't become a leak. It doesn't replace the rule or your judgment;
    it backs them up.

    | Line of defense against a PII slip | Catches it? | What you trust |
    |---|---|---|
    | A written policy alone | Ō£Ś relies on memory | everyone, every time |
    | Your own last-second vigilance | ~ when you remember | your attention, mid-rush |
    | **+ Prompt Anonymizer** | **Ō£ō automatic, on-device** | **code you can read** |

    It replaces PII with consistent labels (`<õ║║ÕÉŹ_1>`, `<Name_1>`, `<Nombre_1>`,
    `<T├¬n_1>`, ŌĆ”) **before** the text leaves your machine. Because the same value
    always gets the same label, the LLM's answer still makes sense ŌĆö you're not
    trading away frontier intelligence to stay safe. When the reply comes back,
    the mapping ŌĆö which never left your device ŌĆö restores the real values.

    For people, it's a second pair of eyes in the browser, desktop app, or Chrome
    extension. For pipelines, the same check runs automatically ŌĆö the
    OpenAI-compatible proxy masks before egress, and the `scan` gate fails a commit
    or CI run when PII slips in.
    
    Supported languages: English (`en`), Japanese (`ja`), Spanish (`es`),
    Vietnamese (`vi`), and ŌĆö new ŌĆö Chinese (`zh`), Korean (`ko`), French (`fr`),
    German (`de`), Portuguese (`pt`) and Italian (`it`). The default
    `PromptAnonymizer(languages=ŌĆ”)` remains `("en", "ja")`; every other language
    is opt-in via `languages=[...]`. All UI language pickers and auto-detect
    cover all ten. Language support is registry-driven ŌĆö adding a language is one
    registry entry (`languages.py` / `languages.ts`) plus one label file.
    
    Detection runs on-device (WebGPU / WASM in the browser, spaCy or local
    transformers in Python). Don't take our word for it: open DevTools, watch
    the network tab, or read the source. It's MIT-licensed and small enough
    to audit in one sitting ŌĆö [docs/AUDIT.md](docs/AUDIT.md) is the
    step-by-step procedure.
    
