    - [Schnellstart (lokaler Proxy)](#schnellstart-lokaler-proxy)
    - [Schnellstart (MCP-Server)](#schnellstart-mcp-server)
    - [Commit- und CI-Gate (`scan`)](#commit--und-ci-gate-scan)
    - [Warum nicht …?](#warum-nicht-)
